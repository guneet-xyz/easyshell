name: push problem (bulk-move)
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/autogenerated-push-bulk-move.yml"
      - "packages/problems/data/problems/bulk-move/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"

concurrency:
  group: push-bulk-move
  cancel-in-progress: false

jobs:
  push:
    environment: registry-push
    runs-on: ubuntu-latest
    steps:
      - name: tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build and start mustang
        run: |
          pnpm run cache
          pnpm run build
          DATABASE_URL=postgresql://fake:fake@localhost:5432/fake MUSTANG_TOKEN=token nohup node mustang.cjs &
          sleep 2
        working-directory: ./apps/mustang
      - run: pnpm run build bulk-move
        name: build problem
        working-directory: ./packages/problems
      - run: pnpm run test bulk-move
        name: test problem
        working-directory: ./packages/problems
      - run: pnpm run push bulk-move
        name: push problem
        working-directory: ./packages/problems
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
