name: push problem (count-files)
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/autogenerated-push-count-files.yml"
      - "packages/problems/data/problems/count-files/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"

concurrency:
  group: push-count-files
  cancel-in-progress: false

jobs:
  push:
    environment: registry-push
    runs-on: ubuntu-latest
    steps:
      - name: tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - uses: actions/setup-go@v5
        with:
          go-version: 1.23.6
      - run: pnpm install --frozen-lockfile
      - name: Build and start mustang
        run: |
          go build -o /tmp/mustang-bin .
          TOKEN=token nohup /tmp/mustang-bin &
          sleep 2
        working-directory: ./apps/mustang
      - run: pnpm run build count-files
        name: build problem
        working-directory: ./packages/problems
      - run: pnpm run test count-files
        name: test problem
        working-directory: ./packages/problems
      - run: pnpm run push count-files
        name: push problem
        working-directory: ./packages/problems
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
