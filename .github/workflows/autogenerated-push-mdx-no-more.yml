name: push problem (mdx-no-more)
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/autogenerated-push-mdx-no-more.yml"
      - "packages/problems/data/problems/mdx-no-more/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"

concurrency:
  group: push-mdx-no-more
  cancel-in-progress: false

jobs:
  push:
    environment: registry-push
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: easyshell_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/easyshell_test
    steps:
      - name: tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec drizzle-kit migrate
        name: Run database migrations
      - name: Build and start mustang
        run: |
          pnpm run cache
          pnpm run build
          MUSTANG_TOKEN=token nohup node mustang.cjs &
          sleep 2
        working-directory: ./apps/mustang
      - run: pnpm run build mdx-no-more
        name: build problem
        working-directory: ./packages/problems
      - run: pnpm run test mdx-no-more
        name: test problem
        working-directory: ./packages/problems
      - run: pnpm run push mdx-no-more
        name: push problem
        working-directory: ./packages/problems
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
