name: push problem (rm-that-file)
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/autogenerated-push-rm-that-file.yml"
      - "packages/problems/data/problems/rm-that-file/**"
      - "packages/env/**"
      - "packages/utils/**"
      - "apps/submission-manager/**"

concurrency:
  group: push-rm-that-file
  cancel-in-progress: false

jobs:
  push:
    environment: registry-push
    runs-on: ubuntu-latest
    steps:
      - name: tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build rm-that-file
        name: build problem
        working-directory: ./packages/problems
      - run: pnpm run test rm-that-file
        name: test problem
        working-directory: ./packages/problems
      - run: pnpm run push rm-that-file
        name: push problem
        working-directory: ./packages/problems
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
