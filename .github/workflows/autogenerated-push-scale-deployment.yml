name: push problem (scale-deployment)
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/autogenerated-push-scale-deployment.yml"
      - "packages/problems/data/problems/scale-deployment/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"
      - "packages/problems/k3s-base/**"
      - "apps/entrypoint/**"

concurrency:
  group: push-scale-deployment
  cancel-in-progress: false

jobs:
  push:
    environment: registry-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build scale-deployment
        name: build problem
        working-directory: ./packages/problems
      - run: pnpm run test scale-deployment
        name: test problem
        working-directory: ./packages/problems
      - run: pnpm run push scale-deployment
        name: push problem
        working-directory: ./packages/problems
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
