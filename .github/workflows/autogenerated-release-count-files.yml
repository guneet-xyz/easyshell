name: release problem (count-files)

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/autogenerated-release-count-files.yml"
      - "packages/problems/data/problems/count-files/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"
  workflow_call:
  workflow_dispatch: {}

concurrency:
  group: release-count-files
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/autogenerated-test-count-files.yml

  release:
    needs: [test]
    environment: registry-push
    runs-on: ubuntu-latest
    steps:
      - name: setup tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: actions/checkout@v4
        name: checkout

      - uses: pnpm/action-setup@v5
        name: setup pnpm

      - uses: actions/setup-node@v4
        name: setup node
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        name: install dependencies

      - run: pnpm run build count-files
        name: build problem
        working-directory: ./packages/problems

      - run: pnpm run push count-files
        name: push problem
        working-directory: ./packages/problems
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
