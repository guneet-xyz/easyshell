name: test problem (cat-out-loud)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-cat-out-loud.yml"
      - "packages/problems/data/problems/cat-out-loud/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - uses: actions/setup-go@v5
        with:
          go-version: 1.23.6
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - name: Build and start mustang
        run: |
          go build -o /tmp/mustang-bin ./apps/mustang
          TOKEN=token nohup /tmp/mustang-bin &
          sleep 2
      - run: pnpm run build cat-out-loud
        working-directory: ./packages/problems
      - run: pnpm run test cat-out-loud
        working-directory: ./packages/problems
