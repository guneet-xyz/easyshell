name: test problem (count-files)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-count-files.yml"
      - "packages/problems/data/problems/count-files/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run build count-files
        working-directory: ./packages/problems
      - run: pnpm run test count-files
        working-directory: ./packages/problems
