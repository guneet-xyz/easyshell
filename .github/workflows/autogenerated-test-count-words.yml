name: test problem (count-words)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-count-words.yml"
      - "packages/problems/data/problems/count-words/**"
      - "packages/env/**"
      - "packages/utils/**"
      - "apps/submission-manager/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run build count-words
        working-directory: ./packages/problems
      - run: pnpm run test count-words
        working-directory: ./packages/problems
