name: test problem (filter-logs)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-filter-logs.yml"
      - "packages/problems/data/problems/filter-logs/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: checkout

      - uses: pnpm/action-setup@v5
        name: setup pnpm

      - uses: actions/setup-node@v4
        name: setup node
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        name: install dependencies

      - run: pnpm run build filter-logs
        name: build problem
        working-directory: ./packages/problems

      - run: pnpm run test filter-logs
        name: test problem
        working-directory: ./packages/problems
