name: test problem (flaky-or-not)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-flaky-or-not.yml"
      - "packages/problems/data/problems/flaky-or-not/**"
      - "packages/env/**"
      - "packages/utils/**"
      - "apps/submission-manager/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run build flaky-or-not
        working-directory: ./packages/problems
      - run: pnpm run test flaky-or-not
        working-directory: ./packages/problems
