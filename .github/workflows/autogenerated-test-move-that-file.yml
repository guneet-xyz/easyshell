name: test problem (move-that-file)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-move-that-file.yml"
      - "packages/problems/data/problems/move-that-file/**"
      - "packages/env/**"
      - "packages/utils/**"
      - "apps/submission-manager/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run build move-that-file
        working-directory: ./packages/problems
      - run: pnpm run test move-that-file
        working-directory: ./packages/problems
