name: test problem (nuke-all-matches)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-nuke-all-matches.yml"
      - "packages/problems/data/problems/nuke-all-matches/**"
      - "packages/env/**"
      - "packages/utils/**"
      - "apps/submission-manager/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run build nuke-all-matches
        working-directory: ./packages/problems
      - run: pnpm run test nuke-all-matches
        working-directory: ./packages/problems
