name: test problem (post-with-token)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-post-with-token.yml"
      - "packages/problems/data/problems/post-with-token/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/coordinator/src/grading/passed-check.ts"
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: checkout

      - uses: pnpm/action-setup@v5
        name: setup pnpm

      - uses: actions/setup-node@v4
        name: setup node
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        name: install dependencies

      - run: pnpm run build post-with-token
        name: build problem
        working-directory: ./packages/problems

      - run: pnpm run test post-with-token
        name: test problem
        working-directory: ./packages/problems
