name: test problem (post-with-token)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-post-with-token.yml"
      - "packages/problems/data/problems/post-with-token/**"
      - "packages/env/**"
      - "packages/utils/**"
      - "apps/submission-manager/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run build post-with-token
        working-directory: ./packages/problems
      - run: pnpm run test post-with-token
        working-directory: ./packages/problems
