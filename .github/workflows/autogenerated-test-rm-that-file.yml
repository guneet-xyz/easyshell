name: test problem (rm-that-file)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-rm-that-file.yml"
      - "packages/problems/data/problems/rm-that-file/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - uses: actions/setup-go@v5
        with:
          go-version: 1.23.6
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - name: Build and start mustang
        run: |
          go build -o /tmp/mustang-bin .
          TOKEN=token nohup /tmp/mustang-bin &
          sleep 2
        working-directory: ./apps/mustang
      - run: pnpm run build rm-that-file
        working-directory: ./packages/problems
      - run: pnpm run test rm-that-file
        working-directory: ./packages/problems
