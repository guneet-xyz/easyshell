name: test problem (say-hello)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-say-hello.yml"
      - "packages/problems/data/problems/say-hello/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - name: Build and start mustang
        run: |
          pnpm run cache
          pnpm run build
          DATABASE_URL=fake MUSTANG_TOKEN=token nohup node mustang.cjs &
          sleep 2
        working-directory: ./apps/mustang
      - run: pnpm run build say-hello
        working-directory: ./packages/problems
      - run: pnpm run test say-hello
        working-directory: ./packages/problems
