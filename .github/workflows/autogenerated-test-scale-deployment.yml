name: test problem (scale-deployment)

on:
  pull_request:
    paths:
      - ".github/workflows/autogenerated-test-scale-deployment.yml"
      - "packages/problems/data/problems/scale-deployment/**"
      - "packages/problems/env.ts"
      - "packages/utils/**"
      - "apps/submission-manager/utils.ts"
      - "packages/problems/k3s-base/**"
      - "apps/entrypoint/**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - uses: actions/setup-go@v5
        with:
          go-version: 1.23.6
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - name: Build and start mustang
        run: |
          go build -o /tmp/mustang-bin .
          TOKEN=token nohup /tmp/mustang-bin &
          sleep 2
        working-directory: ./apps/mustang
      - run: pnpm run build scale-deployment
        working-directory: ./packages/problems
      - run: pnpm run test scale-deployment
        working-directory: ./packages/problems
