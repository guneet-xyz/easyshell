name: Deploy Problems
on:
  workflow_dispatch:
    inputs:
      problem:
        description: "Problem to deploy"
        required: true
        default: "all"
        type: string
jobs:
  push:
    runs-on: ubuntu-latest
    environment: registry-push
    steps:
      - name: tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run build ${{ inputs.problem }}
        name: build
        working-directory: ./packages/problems
      - run: pnpm run test ${{ inputs.problem }}
        name: test
        working-directory: ./packages/problems
      - run: pnpm run push ${{ inputs.problem }}
        name: push
        working-directory: ./packages/problems
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
