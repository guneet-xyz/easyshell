name: Build and push GC controller image

on:
  push:
    branches: [main]
    paths:
      - 'infra/olympia/gc-controller/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: infra/olympia/gc-controller
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/easyshell-gc-controller:v1
            ghcr.io/${{ github.repository_owner }}/easyshell-gc-controller:${{ github.sha }}
