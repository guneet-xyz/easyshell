name: release problems
on:
  workflow_dispatch:
    inputs:
      problem:
        description: "Problem to deploy"
        required: true
        default: "all"
        type: string
  workflow_call:
    inputs:
      problem:
        description: "Problem to deploy"
        required: true
        default: "all"
        type: string
jobs:
  test:
    uses: ./.github/workflows/test-problems.yml
    with:
      problem: ${{ inputs.problem }}

  release:
    needs: [test]
    concurrency:
      group: release-problems-${{ inputs.problem }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: registry-push
    steps:
      - name: setup tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: actions/checkout@v4
        name: checkout

      - uses: pnpm/action-setup@v5
        name: setup pnpm

      - uses: actions/setup-node@v4
        name: setup node
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        name: install dependencies

      - run: pnpm run build ${{ inputs.problem }}
        name: build
        working-directory: ./packages/problems

      - run: pnpm run push ${{ inputs.problem }}
        name: push
        working-directory: ./packages/problems
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
