name: release runner
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-runner.yml"
      - "apps/runner/**"
      - "packages/logger/**"
      - "packages/utils/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_call:
  workflow_dispatch:
jobs:
  test-tsc:
    uses: ./.github/workflows/test-tsc.yml

  test-formatting:
    uses: ./.github/workflows/test-formatting.yml

  release-runner:
    needs: [test-tsc, test-formatting]
    concurrency:
      group: release-runner
      cancel-in-progress: false
    environment: registry-push
    runs-on: ubuntu-latest
    steps:
      - name: setup tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: actions/checkout@v4

      - name: docker build
        run: |
          docker build . \
          -t ${{ vars.DOCKER_REGISTRY }}/easyshell/runner:latest \
          -f ./apps/runner/Dockerfile

      - name: docker push
        run: docker push ${{ vars.DOCKER_REGISTRY }}/easyshell/runner:latest
