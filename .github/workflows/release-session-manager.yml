name: release session-manager
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-session-manager.yml"
      - "apps/session-manager/**"
  workflow_call:
  workflow_dispatch:
jobs:
  test-session-manager:
    uses: ./.github/workflows/test-session-manager.yml

  test-formatting:
    uses: ./.github/workflows/test-formatting.yml

  release-session-manager:
    needs: [test-session-manager, test-formatting]
    concurrency:
      group: release-session-manager
      cancel-in-progress: false
    environment: registry-push
    runs-on: ubuntu-latest
    steps:
      - name: setup tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: actions/checkout@v4
        name: checkout

      - name: docker build
        run: |
          docker build \
          -t ${{ vars.DOCKER_REGISTRY }}/easyshell/session-manager:latest \
          -f ./apps/session-manager/Dockerfile \
          ./apps/session-manager

      - name: docker push
        run: docker push ${{ vars.DOCKER_REGISTRY }}/easyshell/session-manager:latest
