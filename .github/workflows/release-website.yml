name: release website
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-website.yml"
      - "packages/**"
      - "apps/website/**"
  workflow_call:
  workflow_dispatch:
jobs:
  test-tsc:
    uses: ./.github/workflows/test-tsc.yml

  test-formatting:
    uses: ./.github/workflows/test-formatting.yml

  release-website:
    needs: [test-tsc, test-formatting]
    concurrency:
      group: release-website
      cancel-in-progress: false
    environment: registry-push
    runs-on: ubuntu-latest
    steps:
      - name: setup tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: actions/checkout@v4

      - name: docker build
        run: |
          docker build . \
          -t ${{ vars.DOCKER_REGISTRY }}/easyshell/website:latest \
          -f ./apps/website/Dockerfile \
          --build-arg POSTHOG_HOST=${{ vars.POSTHOG_HOST }} \
          --build-arg NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}

      - name: docker push
        run: docker push ${{ vars.DOCKER_REGISTRY }}/easyshell/website:latest
