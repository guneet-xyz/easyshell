name: test mustang
on:
  pull_request:
    paths:
      - ".github/workflows/test-mustang.yml"
      - "apps/mustang/**"
      - "packages/db/**"
      - "packages/mustang/**"
      - "packages/problems/**"
jobs:
  test-mustang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run cache
        name: Cache problem data
        working-directory: ./apps/mustang
      - run: pnpm exec tsc --noEmit
        name: Type check
        working-directory: ./apps/mustang
      - run: pnpm run build
        name: Build (esbuild bundle)
        working-directory: ./apps/mustang
