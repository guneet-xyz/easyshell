name: Test Problems
on:
  workflow_dispatch:
    inputs:
      problem:
        description: "Problem to test"
        required: true
        default: "all"
        type: string
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - uses: actions/setup-go@v5
        with:
          go-version: 1.23.6
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - name: Build and start mustang
        run: |
          go build -o /tmp/mustang-bin .
          TOKEN=token nohup /tmp/mustang-bin &
          sleep 2
        working-directory: ./apps/mustang
      - run: pnpm run build ${{ inputs.problem }}
        working-directory: ./packages/problems
      - run: pnpm run test ${{ inputs.problem }}
        working-directory: ./packages/problems
