name: Test TypeScript Files
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-tsc.yml"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.jsx"
      - "**/*.cjs"
      - "**/*.ejs"
      - "**/*.mjs"
      - "**/*.json"
  pull_request:
    paths:
      - ".github/workflows/test-tsc.yml"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.jsx"
      - "**/*.cjs"
      - "**/*.ejs"
      - "**/*.mjs"
      - "**/*.json"
jobs:
  test-tsc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        name: Install dependencies
      - run: pnpm run cache:website
        working-directory: ./packages/problems
      - run: pnpm run cache:submission-manager
        working-directory: ./packages/problems
      - run: pnpm run cache:cron
        working-directory: ./packages/problems
      - run: pnpm run lint:tsc
        name: Check TypeScript types
      - run: pnpm run lint:next
        name: Lint Next.js files
