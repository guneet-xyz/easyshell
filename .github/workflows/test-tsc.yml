name: test tsc
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-tsc.yml"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.jsx"
      - "**/*.cjs"
      - "**/*.ejs"
      - "**/*.mjs"
      - "**/*.json"
  pull_request:
    paths:
      - ".github/workflows/test-tsc.yml"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.jsx"
      - "**/*.cjs"
      - "**/*.ejs"
      - "**/*.mjs"
      - "**/*.json"
  workflow_call:
jobs:
  test-tsc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: checkout

      - uses: pnpm/action-setup@v5
        name: setup pnpm

      - uses: actions/setup-node@v4
        name: setup node
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        name: install dependencies

      - run: pnpm run cache:website
        name: cache website
        working-directory: ./packages/problems

      - run: pnpm run cache:submission-manager
        name: cache submission-manager
        working-directory: ./packages/problems

      - run: pnpm run lint:tsc
        name: check types

      - run: pnpm run lint:next
        name: lint next
