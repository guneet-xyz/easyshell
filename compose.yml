networks:
  easyshell:
    external: true
services:
  migrator:
    build:
      context: .
      dockerfile: ./apps/migrator/Dockerfile
    container_name: easyshell-dev-migrator
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - easyshell
    restart: "no"
  submission-manager:
    build:
      context: .
      dockerfile: ./apps/submission-manager/Dockerfile
    container_name: easyshell-dev-submission-manager
    networks:
      - easyshell
    depends_on:
      migrator:
        condition: service_completed_successfully
      session-manager:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_MANAGER_URL: http://session-manager:4000
      SESSION_MANAGER_TOKEN: token
  session-manager:
    build:
      context: ./apps/session-manager
    container_name: easyshell-dev-session-manager
    environment:
      TOKEN: token
    networks:
      - easyshell
    ports:
      - 4000:4000
    volumes:
      - /tmp/easyshell:/tmp/easyshell
      - /var/run/docker.sock:/var/run/docker.sock
  coordinator:
    build:
      context: .
      dockerfile: ./apps/coordinator/Dockerfile
    container_name: easyshell-dev-coordinator
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      COORDINATOR_TOKEN: token-coordinator
      COORDINATOR_REGISTRATION_TOKEN: token-registration
      LOG_LEVEL: debug
      NODE_ENV: development
      MAX_ATTEMPTS: "3"
    networks:
      - easyshell
    ports:
      - 4100:4100
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4100 2>/dev/null || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s
  runner:
    build:
      context: .
      dockerfile: ./apps/runner/Dockerfile
    container_name: easyshell-dev-runner
    depends_on:
      coordinator:
        condition: service_healthy
    environment:
      RUNNER_NAME: runner-1
      RUNNER_PUBLIC_URL: http://runner:4200
      COORDINATOR_URL: http://coordinator:4100
      COORDINATOR_REGISTRATION_TOKEN: token-registration
      RUNNER_DB_PATH: /var/lib/easyshell-runner/runner.db
      WORKING_DIR: /tmp/easyshell
      LOG_LEVEL: debug
      NODE_ENV: development
    networks:
      - easyshell
    ports:
      - 4200:4200
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/easyshell:/tmp/easyshell
      - runner-data:/var/lib/easyshell-runner
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4200 2>/dev/null || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s
  website:
    build:
      context: .
      dockerfile: ./apps/website/Dockerfile
      args:
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
        POSTHOG_HOST: ${POSTHOG_HOST}
    container_name: easyshell-dev-website
    depends_on:
      migrator:
        condition: service_completed_successfully
      session-manager:
        condition: service_started
    environment:
      AUTH_TRUST_HOST: true
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: secret
      NEXTAUTH_URL: http://localhost:3000
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SESSION_MANAGER_URL: http://session-manager:4000
      SESSION_MANAGER_TOKEN: token
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_MAIL_FROM: ${SMTP_MAIL_FROM}
      POSTHOG_HOST: ${POSTHOG_HOST}
    networks:
      - easyshell
    ports:
      - 3000:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 1s
      timeout: 500ms
      retries: 3
volumes:
  runner-data:
