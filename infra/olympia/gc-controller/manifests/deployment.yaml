apiVersion: apps/v1
kind: Deployment
metadata:
  name: gc-controller
  namespace: gc-system
  labels:
    app: gc-controller
    easyshell.sh/component: gc-controller
spec:
  # DO NOT SCALE; no leader election. See infra/olympia/CONTRACT.md
  replicas: 1
  selector:
    matchLabels:
      app: gc-controller
  template:
    metadata:
      labels:
        app: gc-controller
        easyshell.sh/component: gc-controller
    spec:
      serviceAccountName: gc-controller
      imagePullSecrets:
        - name: ghcr-creds
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gc-controller
          image: ghcr.io/${GITHUB_OWNER}/easyshell-gc-controller:${GC_IMAGE_TAG:-v1}
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
