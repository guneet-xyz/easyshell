apiVersion: v1
kind: Namespace
metadata:
  name: gc-system
  labels:
    easyshell.sh/component: gc-controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gc-controller
  namespace: gc-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gc-controller
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "get", "delete", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gc-controller
subjects:
  - kind: ServiceAccount
    name: gc-controller
    namespace: gc-system
roleRef:
  kind: ClusterRole
  name: gc-controller
  apiGroup: rbac.authorization.k8s.io
