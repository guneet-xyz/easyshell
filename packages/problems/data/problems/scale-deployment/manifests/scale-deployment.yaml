apiVersion: v1
kind: Namespace
metadata:
  name: q34
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scale-app
  namespace: q34
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scale-app
  template:
    metadata:
      labels:
        app: scale-app
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
